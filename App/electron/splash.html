<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #1e1e1e;
      overflow: hidden;
      border-radius: 8px;
      user-select: none;
    }
    
    .video-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    img {
      max-width: 70%;
      max-height: 70%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <img src="loading.gif" alt="Loading animation">
  </div>
  <div class="message" style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; font-family: sans-serif; font-size: 14px;">Initializing...</div>
  <button id="splash-close-button" aria-label="Close" style="position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 999px; color: #ffffff; font-weight: bold; cursor: pointer; font-size: 18px; line-height: 22px;">×</button>
  <script>
    document.getElementById('splash-close-button').addEventListener('click', function() {
      window.close();
    });
  </script>
</body>
</html>
